function pointInPoly(lat, lon, poly) {
  let inside = false;
  for (let i=0, j=poly.length-1; i<poly.length; j=i++) {
    const [yi,xi] = poly[i], [yj,xj] = poly[j];
    if (((yi>lat) !== (yj>lat)) && lon < (xj-xi)*(lat-yi)/(yj-yi)+xi) inside=!inside;
  }
  return inside;
}

const HOP_META = {
  1: { color:'#f0c040', label:'1-byte (non-standard)' },
  2: { color:'#3fb950', label:'2-byte (standard)'     },
  3: { color:'#e05252', label:'3-byte (non-standard)' },
  0: { color:'#8b949e', label:'Unknown'               },
};
function hopBytes(r) {
  if (r.hop_bytes) return r.hop_bytes;
  const id = r.id || '';
  if (/^[0-9a-fA-F]{2}$/.test(id)) return 1;
  if (/^[0-9a-fA-F]{4}$/.test(id)) return 2;
  if (/^[0-9a-fA-F]{6}$/.test(id)) return 3;
  return 0;
}

const repMeta = {};
REPEATERS.forEach(r => {
  repMeta[r.name] = {
    hb: hopBytes(r),
    inAus: pointInPoly(r.lat, r.lon, AUS_BOUNDARY),
  };
});

// ── Augment edges with hop bytes, AUS flags, and formatted timestamp ─────────
function fmtLinkTime(unix) {
  if (!unix) return null;
  const d = new Date(unix * 1000);
  const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  const day = d.getDate();
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  return `${mo} ${day}, ${hh}:${mm}`;
}

const FRESNEL_STATUS_COLOR = {
  'CLEAR':'#3fb950','MARGINAL':'#f0c040','OBSTRUCTED':'#e05252',
  'BLOCKED':'#8b3a8b','no_data':'#8b949e'
};
function calcBearing(from, to) {
  const lat1 = from[0]*Math.PI/180, lat2 = to[0]*Math.PI/180;
  const dlon = (to[1]-from[1])*Math.PI/180;
  const y = Math.sin(dlon)*Math.cos(lat2);
  const x = Math.cos(lat1)*Math.sin(lat2) - Math.sin(lat1)*Math.cos(lat2)*Math.cos(dlon);
  return (Math.atan2(y,x)*180/Math.PI + 360) % 360;
}
function cardinalBearing(deg) {
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(deg/22.5) % 16] + ' ' + Math.round(deg) + '°';
}
function fresnelTable(nodeName) {
  const fd = FRESNEL_BY_NODE[nodeName];
  if (!fd || !fd.paths.length) return '';
  const STEPS = [0,2,4,6,8,10];
  const col = m => m >= 5 ? '#3fb950' : m >= 0 ? '#f0c040' : '#e05252';
  const aglFt = Math.round(fd.agl * 3.281);
  const aglNote = fd.agl === 0
    ? ' <span style="opacity:.5">(unknown — modeled at ground level)</span>'
    : '';
  const paths = fd.paths.slice().sort((a,b) => a.d - b.d);
  let h = `<hr><b>Antenna height sensitivity</b><br>`
        + `<span style="opacity:.6;font-size:10px">Current: ${fd.agl}m (${aglFt}ft) AGL${aglNote}</span>`
        + `<table style="font-size:10px;border-collapse:collapse;width:100%;margin-top:5px">`
        + `<tr><th style="text-align:left;padding:2px 4px;opacity:.5;font-weight:normal">Path</th>`
        + STEPS.map(s=>`<th style="padding:2px 3px;opacity:.5;font-weight:normal">+${s}m</th>`).join('')
        + `<th style="padding:2px 3px 2px 6px;opacity:.5;font-weight:normal;white-space:nowrap;width:90px"></th></tr>`;
  for (const p of paths) {
    const label = p.n.length > 16 ? p.n.slice(0,15)+'…' : p.n;
    h += `<tr><td style="padding:2px 4px;white-space:nowrap" title="${p.n}">${label} <span style="opacity:.4">${p.d}km</span></td>`;
    for (const s of STEPS) {
      const m = p.sw[s] ?? null;
      if (m === null) { h += '<td>—</td>'; continue; }
      const c = col(m);
      const txt = (m >= 0 ? '+' : '') + m.toFixed(0);
      h += `<td style="background:${c}22;color:${c};text-align:center;padding:2px 2px;font-weight:bold">${txt}</td>`;
    }
    // Note column
    let note = '';
    if (p.s === 'BLOCKED') {
      note = `<span style="color:#8b3a8b;font-size:9px">⛔ terrain</span>`;
    } else if (p.cl) {
      note = `<span style="opacity:.5;font-size:9px">⚠ local clutter</span>`;
    } else if (p.ma > 0 && p.ma <= 10) {
      note = `<span style="color:#3fb950;font-size:9px">↑ +${p.ma}m clears</span>`;
    } else if (p.ma > 10) {
      note = `<span style="opacity:.5;font-size:9px">needs +${p.ma}m</span>`;
    }
    h += `<td style="padding:2px 4px;white-space:nowrap">${note}</td></tr>`;
  }
  h += `</table>`
     + `<div style="opacity:.45;font-size:9px;margin-top:4px">60% F1 Fresnel clearance (geometric baseline) · 915 MHz ISM · LoRa SF12.</div>`
     + `<div style="opacity:.45;font-size:9px">Link budget: +20 dBm TX · 2 dBi antennas · −130 dBm sensitivity = 154 dB total.</div>`
     + `<div style="opacity:.45;font-size:9px">LoRa spread spectrum operates below F1 — OBSTRUCTED ≠ non-functional.</div>`;
  return h;
}

const EDGES_AUG = EDGES.map(e => {
  const fm = repMeta[e.from_name] || {}, tm = repMeta[e.to_name] || {};
  const dlat = e.from[0] - e.to[0];
  const dlon = e.from[1] - e.to[1];
  const cosLat = Math.cos((e.from[0] + e.to[0]) / 2 * Math.PI / 180);
  const distKm = Math.hypot(dlat * 111, dlon * 111 * cosLat);
  const mqtt = distKm > 100;
  const pathType = e.bidir ? (mqtt ? 'bidir-mqtt' : 'bidir') : (mqtt ? 'oneway-mqtt' : 'oneway');
  return { ...e, pathType, mqtt, distKm,
           from_hb: fm.hb??0, to_hb: tm.hb??0,
           from_inAus: fm.inAus??false, to_inAus: tm.inAus??false,
           last_used_fmt: fmtLinkTime(e.last_used) };
});

let filterAus  = false;

function edgeVisible(e) {
  if (!activePath.has(e.pathType)) return false;
  if (!activeHop.has(e.from_hb) || !activeHop.has(e.to_hb)) return false;
  if (filterAus && (!e.from_inAus || !e.to_inAus)) return false;
  return true;
}
function repVisible(r) {
  const m = repMeta[r.name]||{};
  if (!activeHop.has(m.hb??0)) return false;
  if (filterAus && !m.inAus) return false;
  const edges = edgesByName[r.name]||[];
  if (edges.length===0) return true;          // isolated node: show when group on
  return edges.some(e => edgeVisible(e));
}

const terrainGroup = L.layerGroup().addTo(map);
TERRAIN_OBSTACLES.forEach(ob => {
  const pathLines = ob.paths.map(p =>
    `<span style="opacity:.7">${p.from}</span> → <span style="opacity:.7">${p.to}</span> <span style="color:#e05252">(${p.m}m)</span>`
  ).join('<br>');
  const more = ob.paths.length === 8 ? '<br><span style="opacity:.5;font-size:10px">…and more</span>' : '';
  const elevLine = ob.elev != null
    ? `<span style="opacity:.5;font-size:10px">Ground elevation: ${ob.elev}m (${Math.round(ob.elev*3.281)}ft) MSL</span><br>`
    : '';
  const marker = L.marker([ob.lat, ob.lon], {
    icon: L.divIcon({html:'▲', className:'terrain-obs-icon', iconSize:[14,14], iconAnchor:[7,12]}),
    interactive: true,
    zIndexOffset: 500,
  });
  marker.bindTooltip(`
    <div style="font-size:11px">
      <b style="color:#8b3a8b">▲ Terrain obstacle</b><br>
      ${elevLine}<span style="opacity:.5;font-size:10px">Worst Fresnel deficit (paths blocked):</span><br>
      ${pathLines}${more}
    </div>`, {sticky:true, direction:'top', className:'edge-tip'});
  marker.addTo(terrainGroup);
});
function refreshTerrainObs() {
  terrainGroup.eachLayer(m => {
    const el = m.getElement();
    if (el) el.style.display = showTerrainObs ? '' : 'none';
  });
}

// ── Build repeater markers ────────────────────────────────────────────────────
const REP_DATA = [];
const repGroup = L.layerGroup().addTo(map);

REPEATERS.forEach(r => {
  const hb = (repMeta[r.name]||{}).hb ?? 0;
  const { color:fillColor, label:hopLabel } = HOP_META[hb];
  const marker = L.circleMarker([r.lat,r.lon], {
    radius:5, color:'rgba(255,255,255,0.3)', weight:1, fillColor, fillOpacity:0.85
  });
  const displayId = r.display_id || (r.id && /^[0-9a-fA-F]{2,6}$/.test(r.id) ? r.id : null);
  const pubIdLine = r.public_id ? `<b>Public ID:</b> <span style="font-size:10px;opacity:.7">${r.public_id.slice(0,16)}…</span><br>` : '';
  marker.bindPopup(`
    <div class="popup-name">${r.name}</div>
    <span class="popup-badge badge-active">${hopLabel}</span>
    <br><br>
    ${r.maintainer ? `<b>Maintainer:</b> ${r.maintainer}<br>` : ''}
    <b>ID:</b> ${displayId || '—'}<br>
    ${pubIdLine}<b>Last heard:</b> ${r.last_heard || '—'}<br>
    <b>Location:</b> ${r.lat.toFixed(4)}, ${r.lon.toFixed(4)}<br>
    ${REPEATER_ELEV[r.name] != null ? `<b>Ground elevation:</b> ${REPEATER_ELEV[r.name]}m (${Math.round(REPEATER_ELEV[r.name]*3.281)}ft) MSL<br>` : ''}
    ${fresnelTable(r.name)}
  `);
  marker.bindTooltip(r.name, {direction:'top', offset:[0,-6]});
  marker.addTo(repGroup);
  REP_DATA.push({r, hb, marker});
});

// ── Visibility refresh (cascading filter) ────────────────────────────────────
function refreshVisibility() {
  EDGE_DATA.forEach(({e, line, visual}) => {
    const v = edgeVisible(e);
    // Hide/show the interactive hit-area line
    line.setStyle({opacity: 0});
    if (line.getElement()) line.getElement().style.pointerEvents = v ? '' : 'none';
    // Hide/show the visible line + its SVG markers via opacity attribute
    const vpath = visual && visual.getElement();
    if (vpath) vpath.setAttribute('opacity', v ? 1 : 0);
  });
  REP_DATA.forEach(({r, marker}) => {
    const v = repVisible(r);
    marker.setStyle({opacity: v?0.3:0, fillOpacity: v?0.85:0});
    const el = marker.getElement();
    if (el) el.style.pointerEvents = v ? '' : 'none';
  });
}

// ── Layer control (coverage only — no conflict with right panels) ─────────────
const covOverlays = {};
Object.entries(TYPE_META).forEach(([t,m]) => {
  covOverlays[`<span style="color:${m.color}">${t}</span>`] = covLayers[t];
});
L.control.layers(null, covOverlays, {collapsed:true, position:'topleft'}).addTo(map);

// ── Right-side collapsible panels ────────────────────────────────────────────
function togglePanel(el) { el.classList.toggle('collapsed'); }
const rightCol = document.createElement('div');
rightCol.id = 'right-col';
document.getElementById('map').appendChild(rightCol);
L.DomEvent.disableClickPropagation(rightCol);

function makePanel(id, title, bodyHtml) {
  const p = document.createElement('div');
  p.id = id; p.className = 'side-panel';
  p.innerHTML = `
    <div class="panel-hdr" onclick="togglePanel(this.parentElement)">
      <span>${title}</span><span class="panel-chevron">&#9660;</span>
    </div>
    <div class="panel-body">${bodyHtml}</div>`;
  rightCol.appendChild(p);
  return p;
}

// Routing Paths panel — clickable, calls refreshVisibility
const routingPanel = makePanel('panel-routing', 'Routing Table Entries', `
  <div style="opacity:.5;font-size:10px;margin-bottom:8px;line-height:1.4">From node routing tables · 915 MHz ISM / LoRa.<br>May include multi-hop propagated entries — not all are direct LoRa links.</div>
  <div class="legend-row" data-path="bidir" style="margin-bottom:4px">
    <div class="line-swatch" style="background:#f0c040"></div>
    <span>Bidirectional ↔</span>
  </div>
  <div class="legend-row" data-path="oneway" style="margin-bottom:8px">
    <div class="line-swatch" style="background:#58a6ff"></div>
    <span>One-way →</span>
  </div>
  <div class="legend-row" data-path="bidir-mqtt" style="margin-bottom:4px">
    <div class="line-swatch" style="background:repeating-linear-gradient(90deg,#f0c040 0,#f0c040 7px,transparent 7px,transparent 12px)"></div>
    <span>Bidirectional (MQTT) ↔</span>
  </div>
  <div class="legend-row" data-path="oneway-mqtt">
    <div class="line-swatch" style="background:repeating-linear-gradient(90deg,#58a6ff 0,#58a6ff 7px,transparent 7px,transparent 12px)"></div>
    <span>One-way (MQTT) →</span>
  </div>
  <div style="border-top:1px solid #30363d;margin:8px 0 6px"></div>
  <div class="legend-row" id="row-terrain-obs" style="margin-bottom:0;cursor:pointer">
    <span style="color:#8b3a8b;font-size:14px;line-height:1;margin-right:6px">▲</span>
    <span>Terrain obstacles</span>
  </div>`);
document.getElementById('row-terrain-obs').addEventListener('click', () => {
  showTerrainObs = !showTerrainObs;
  document.getElementById('row-terrain-obs').style.opacity = showTerrainObs ? '1' : '0.35';
  refreshTerrainObs();
});
routingPanel.querySelectorAll('.legend-row[data-path]').forEach(row => {
  row.style.cursor = 'pointer';
  row.addEventListener('click', () => {
    const pt = row.dataset.path;
    if (activePath.has(pt)) { activePath.delete(pt); row.classList.add('hidden'); }
    else { activePath.add(pt); row.classList.remove('hidden'); }
    refreshVisibility();
  });
});

// Coverage panel — independent (no cascade needed)
const covPanel = makePanel('panel-coverage', 'Coverage', `
  ${Object.entries(TYPE_META).map(([t,m]) =>
    `<div class="legend-row" data-type="${t}" style="margin-bottom:2px">
       <div class="swatch" style="background:${m.color}"></div>
       <span>${m.label}</span>
     </div>`
  ).join('')}`);
covPanel.querySelectorAll('.legend-row[data-type]').forEach(row => {
  row.addEventListener('click', () => {
    const t = row.dataset.type;
    if (map.hasLayer(covLayers[t])) { map.removeLayer(covLayers[t]); row.classList.add('hidden'); }
    else { map.addLayer(covLayers[t]); row.classList.remove('hidden'); }
  });
  if (!DEFAULT_VISIBLE.has(row.dataset.type)) row.classList.add('hidden');
});

// Repeaters panel — hop byte toggles + AUS filter
const repPanel = makePanel('panel-repeaters', 'Repeaters', `
  <div class="legend-row" data-hb="1" style="margin-bottom:3px">
    <div class="dot" style="background:#f0c040;border-color:rgba(255,255,255,.3)"></div>
    <span>1-byte (non-standard)</span>
  </div>
  <div class="legend-row" data-hb="2" style="margin-bottom:3px">
    <div class="dot" style="background:#3fb950;border-color:rgba(255,255,255,.3)"></div>
    <span>2-byte (standard)</span>
  </div>
  <div class="legend-row" data-hb="3" style="margin-bottom:3px">
    <div class="dot" style="background:#e05252;border-color:rgba(255,255,255,.3)"></div>
    <span>3-byte (non-standard)</span>
  </div>
  <div class="legend-row" data-hb="0" style="margin-bottom:6px">
    <div class="dot" style="background:#8b949e;border-color:rgba(255,255,255,.3)"></div>
    <span>Unknown</span>
  </div>
  <div class="legend-sep"></div>
  <div class="legend-row" id="row-aus-filter" style="margin-top:4px;cursor:pointer">
    <div class="swatch" style="background:rgba(88,166,255,0.2);border:1px dashed #58a6ff;width:14px;height:14px;border-radius:2px"></div>
    <span>AUS region only</span>
  </div>
  <div class="legend-row" id="row-boundary" style="margin-top:3px;cursor:pointer">
    <div class="swatch" style="background:transparent;border:2px dashed #58a6ff;width:14px;height:14px;border-radius:2px"></div>
    <span>Show boundary</span>
  </div>`);

repPanel.querySelectorAll('.legend-row[data-hb]').forEach(row => {
  row.style.cursor = 'pointer';
  row.addEventListener('click', () => {
    const hb = +row.dataset.hb;
    if (activeHop.has(hb)) { activeHop.delete(hb); row.classList.add('hidden'); }
    else { activeHop.add(hb); row.classList.remove('hidden'); }
    refreshVisibility();
  });
});

// AUS filter: faded = off (show all), normal = on (AUS only)
const ausFilterRow = document.getElementById('row-aus-filter');
ausFilterRow.classList.add('hidden');  // starts off
ausFilterRow.addEventListener('click', () => {
  filterAus = !filterAus;
  ausFilterRow.classList.toggle('hidden', !filterAus);
  refreshVisibility();
});

// Boundary toggle: faded = hidden, normal = visible
const boundaryRow = document.getElementById('row-boundary');
boundaryRow.addEventListener('click', () => {
  showBoundary = !showBoundary;
  if (showBoundary) ausBoundaryLayer.addTo(map);
  else map.removeLayer(ausBoundaryLayer);
  boundaryRow.classList.toggle('hidden', !showBoundary);
});

// ── Stats panel ───────────────────────────────────────────────────────────────
const bidir    = COVERAGE.filter(c=>c[4]==='BIDIR').length;
const confirmed = COVERAGE.filter(c=>['BIDIR','RX','TX'].includes(c[4])).length;
const activeRep = REPEATERS.filter(r=>r.status==='Active').length;
const ausCount  = REPEATERS.filter(r=>(repMeta[r.name]||{}).inAus).length;
makePanel('panel-stats', 'CT Region Stats', `
  <div class="stat-row"><span>Confirmed coverage</span><span style="color:#3fb950">${(confirmed/COVERAGE.length*100).toFixed(1)}%</span></div>
  <div class="stat-row"><span>BIDIR squares</span><span style="color:#1e7e34">${bidir}</span></div>
  <div class="stat-row"><span>Active repeaters</span><span style="color:#58a6ff">${activeRep}</span></div>
  <div class="stat-row"><span>AUS region repeaters</span><span style="color:#58a6ff">${ausCount}</span></div>
  <div class="stat-row"><span>Confirmed links</span><span style="color:#f0c040">613</span></div>`);

</script>
</body>
</html>
